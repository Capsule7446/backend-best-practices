[config]
model = "gpt-5.6-sol"
fallback_models = ["gpt-5.5"]
custom_model_max_tokens = 128000
response_language = "zh-CN"

[pr_reviewer]
extra_instructions = "请用中文进行 PR Review。此 repo 提供后端架构、DDD、CQRS 实践与技能包，重点检查示例和指令是否会误导实现、DDD/CQRS 边界是否清晰、读写模型同步与一致性风险、跨语言建议准确性、测试/文档覆盖和可维护性。"

[pr_description]
extra_instructions = "请用中文总结 PR 变更。"

[pr_code_suggestions]
extra_instructions = "请用中文给出代码改进建议。"
