name: PR Agent

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  pr_agent:
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request)
    runs-on: ubuntu-latest
    env:
      OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check PR Agent configuration
        if: ${{ env.OPENAI_API_BASE == '' || env.OPENAI_API_KEY == '' }}
        run: echo "OPENAI_API_BASE or OPENAI_API_KEY is not configured; skipping PR Agent."

      - name: PR Agent
        if: ${{ env.OPENAI_API_BASE != '' && env.OPENAI_API_KEY != '' }}
        uses: The-PR-Agent/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_KEY: ${{ env.OPENAI_API_KEY }}
          OPENAI__KEY: ${{ env.OPENAI_API_KEY }}
          OPENAI__API_BASE: ${{ env.OPENAI_API_BASE }}
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "false"
          github_action_config.auto_improve: "false"
          github_action_config.pr_actions: '["opened", "reopened", "ready_for_review", "synchronize"]'
          github_action_config.handle_push_trigger: "true"
          github_action_config.push_commands: '["/review"]'
