name: PR Agent

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  pr_agent:
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) &&
      (contains(fromJson('["/review","/describe","/improve"]'), github.event.comment.body) ||
      startsWith(github.event.comment.body, '/ask ')))
    runs-on: ubuntu-latest
    env:
      OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check PR Agent configuration
        if: ${{ env.OPENAI_API_BASE == '' || env.OPENAI_API_KEY == '' }}
        run: echo "OPENAI_API_BASE or OPENAI_API_KEY is not configured; skipping PR Agent."

      - name: PR Agent
        if: ${{ env.OPENAI_API_BASE != '' && env.OPENAI_API_KEY != '' }}
        uses: The-PR-Agent/pr-agent@b1328dff6c598633d78b69d1035298ca3f8aeffb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_KEY: ${{ env.OPENAI_API_KEY }}
          OPENAI__KEY: ${{ env.OPENAI_API_KEY }}
          OPENAI__API_BASE: ${{ env.OPENAI_API_BASE }}
          CONFIG__MODEL: gpt-5.5
          CONFIG__FALLBACK_MODELS: '["gpt-5.4"]'
          CONFIG__CUSTOM_MODEL_MAX_TOKENS: "128000"
          CONFIG__RESPONSE_LANGUAGE: zh-CN
          PR_REVIEWER__EXTRA_INSTRUCTIONS: 请用中文进行 PR Review，重点关注潜在 bug、安全风险、边界条件、测试缺失和可维护性。
          PR_REVIEWER__ENABLE_REVIEW_LABELS_EFFORT: "false"
          PR_DESCRIPTION__EXTRA_INSTRUCTIONS: 请用中文总结 PR 变更。
          PR_CODE_SUGGESTIONS__EXTRA_INSTRUCTIONS: 请用中文给出代码改进建议。
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "false"
          github_action_config.auto_improve: "false"
          github_action_config.pr_actions: '["opened", "reopened", "ready_for_review", "synchronize"]'
          github_action_config.handle_push_trigger: "true"
          github_action_config.push_commands: '["/review"]'
