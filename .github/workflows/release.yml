name: Package plugin

# 推送 v* 标签时自动打包，并把 zip 附加到对应的 GitHub Release。
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build plugin zip
        shell: pwsh
        run: ./scripts/pack.ps1

      - name: Attach zip to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          # Release 不存在则先建（自动生成发布说明）；已存在则保留原说明。
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --generate-notes
          fi
          # 上传/覆盖 zip 资产。
          gh release upload "$TAG" dist/*.zip --repo "$GITHUB_REPOSITORY" --clobber
